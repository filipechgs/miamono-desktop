appId: com.miamono.desktop
productName: Miamono Desktop
artifactName: Instalador-Miamono-Desktop-${version}.${ext}
directories:
  output: release
files:
  - dist/**
  - package.json
extraResources:
  - from: doc
    to: doc
    filter:
      - miamono-mascote.ico
      - miamono-mascote.png
extraMetadata:
  main: dist/main/main.js
asar: true
win:
  target:
    - nsis
  icon: doc/miamono-mascote.ico
  signAndEditExecutable: false
forceCodeSigning: false
nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - tar.gz
  category: Office
  icon: doc/miamono-mascote.png
