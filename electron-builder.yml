appId: com.miamono.desktop
productName: Miamono Desktop
directories:
  output: release
files:
  - dist/**
  - doc/**
  - package.json
extraMetadata:
  main: dist/main/main.js
asar: true
win:
  target:
    - nsis
  icon: doc/miamono-mascote.ico
  signAndEditExecutable: false
forceCodeSigning: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - tar.gz
  category: Office
  icon: doc/miamono-mascote.png
